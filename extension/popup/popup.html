<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: system-ui; width: 280px; padding: 16px; background: #0f172a; color: white; }
    h2 { font-size: 16px; margin: 0 0 8px; }
    p { font-size: 12px; color: #94a3b8; margin: 0 0 12px; }
    button { width: 100%; background: #2563eb; color: white; border: none; border-radius: 8px; padding: 10px; cursor: pointer; font-size: 13px; }
    button:hover { background: #1d4ed8; }
    #status { margin-top: 10px; font-size: 12px; color: #22c55e; }
  </style>
</head>
<body>
  <h2>LinkedIn Networkify</h2>
  <p>Browse your LinkedIn network — the extension collects 2nd-degree connections as you go.</p>
  <button id="sync">Sync Now</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
